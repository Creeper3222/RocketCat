<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RocketCat Dashboard Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <section class="hero-card">
        <div>
          <p class="eyebrow">RocketCat Native Dashboard</p>
          <h1>插件 UI 已经住进 RocketCatShell</h1>
          <p class="hero-copy">
            这个页面没有启动额外端口，也不持有 WebUI 登录凭证。所有动态能力都通过父页面提供的安全 Bridge 完成。
          </p>
        </div>
        <div id="bridgeBadge" class="bridge-badge pending">正在连接 Bridge</div>
      </section>

      <section class="metric-grid">
        <article class="metric-card">
          <span>插件</span>
          <strong id="pluginName">-</strong>
        </article>
        <article class="metric-card">
          <span>插件版本</span>
          <strong id="pluginVersion">-</strong>
        </article>
        <article class="metric-card">
          <span>RocketCatShell</span>
          <strong id="shellVersion">-</strong>
        </article>
        <article class="metric-card">
          <span>当前页面</span>
          <strong id="pageName">-</strong>
        </article>
      </section>

      <section class="detail-card">
        <div>
          <p class="eyebrow">Runtime Context</p>
          <h2>由父 WebUI 安全注入的页面上下文</h2>
        </div>
        <pre id="contextOutput">等待 RocketCatPluginDashboard.ready…</pre>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
